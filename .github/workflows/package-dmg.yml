name: Build Pulsar

# Builds an unsigned Pulsar.app, wraps it in a .dmg, and (when
# triggered by a v*.*.* tag) attaches the .dmg + appcast.xml to a GitHub
# Release. Modelled on the orion-by-orbit build workflow.
#
# No Apple Developer ID required for now. Output is unsigned — users see a
# Gatekeeper prompt on first launch and bypass it once with
# `xattr -dr com.apple.quarantine /Applications/Pulsar.app`
# (documented in the README and in each release's body).

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  decide:
    name: Skip duplicate run?
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: gate
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            if git tag --points-at HEAD | grep -qE '^v[0-9]'; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Skipping main run — commit has v* tag"
              exit 0
            fi
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

  build:
    needs: decide
    if: needs.decide.outputs.should_run == 'true'
    name: Build & package .dmg
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: macos/Pulsar/.build
          key: swiftpm-${{ runner.os }}-${{ hashFiles('macos/Pulsar/Package.swift', 'macos/Pulsar/Sources/**/*.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Resolve build version from tag (or main)
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            MARKETING_VERSION="${GITHUB_REF_NAME#v}"
          else
            MARKETING_VERSION="0.0.${{ github.run_number }}"
          fi
          BUILD_NUMBER="${{ github.run_number }}"
          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Building Pulsar $MARKETING_VERSION (build $BUILD_NUMBER)"

      - name: Build (unsigned, Release)
        run: |
          cd macos/Pulsar
          swift build -c release

      - name: Locate built binary
        id: locate
        run: |
          set -e
          # Exclude .dSYM bundles — they contain a DWARF copy of the binary
          # that would otherwise match the find and produce a wrong path.
          BINARY_PATH=$(find macos/Pulsar/.build -name "Pulsar" -type f -path "*/release/*" -not -path "*.dSYM*" | head -n 1)
          if [ -z "$BINARY_PATH" ]; then
            echo "::error::Could not find Pulsar binary under macos/Pulsar/.build"
            find macos/Pulsar/.build -type f | sort
            exit 1
          fi
          echo "binary_path=$BINARY_PATH" >> "$GITHUB_OUTPUT"
          RELEASE_DIR="$(dirname "$BINARY_PATH")"
          echo "release_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"
          echo "Found binary at: $BINARY_PATH"
          echo "Release dir contents:"
          ls "$RELEASE_DIR" | head -20

      - name: Assemble Pulsar.app bundle
        id: bundle
        run: |
          set -e
          APP_PATH="$RUNNER_TEMP/Pulsar.app"
          mkdir -p "$APP_PATH/Contents/MacOS" "$APP_PATH/Contents/Resources"

          cp "${{ steps.locate.outputs.binary_path }}" "$APP_PATH/Contents/MacOS/Pulsar"
          cp macos/Pulsar/Info.plist "$APP_PATH/Contents/Info.plist"
          cp macos/Pulsar/Sources/Resources/AppIcon.icns "$APP_PATH/Contents/Resources/AppIcon.icns"

          if [ -d assets/portraits ]; then
            mkdir -p "$APP_PATH/Contents/Resources/assets"
            cp -R assets/portraits "$APP_PATH/Contents/Resources/assets/portraits"
          fi

          # Claude voice-integration payload — the exact files the in-app
          # installer drops into ~/.claude (skill + hooks + say.sh + the
          # uninstall script for manual reversal). Mirrors build-pulsar-app.sh's
          # sync list; without this the CI-built DMG ships with no installer
          # payload and the in-app "Set up / Remove" buttons are inert.
          CI_STAGE="$APP_PATH/Contents/Resources/claude-integration"
          mkdir -p "$CI_STAGE/scripts"
          cp SKILL.md    "$CI_STAGE/SKILL.md"
          cp CANON.md    "$CI_STAGE/CANON.md"
          cp voices.json "$CI_STAGE/voices.json"
          for f in say.sh session-start-voice.sh stop-hook.sh chime.sh \
                   turn-start.sh statusline.sh subagent-start.sh subagent-stop.sh \
                   install-hooks.sh uninstall-hooks.sh; do
            cp "scripts/$f" "$CI_STAGE/scripts/$f"
          done
          chmod +x "$CI_STAGE/scripts/"*.sh 2>/dev/null || true

          # Embed Sparkle.framework. The binary loads @rpath/Sparkle.framework
          # and carries an @executable_path/../Frameworks rpath (set in
          # Package.swift), so the framework must live at Contents/Frameworks
          # or the app dyld-crashes on launch. Mirrors build-pulsar-app.sh.
          # ditto preserves the framework's Versions/ symlink layout.
          FRAMEWORK_SRC="${{ steps.locate.outputs.release_dir }}/Sparkle.framework"
          if [ ! -d "$FRAMEWORK_SRC" ]; then
            echo "::error::Sparkle.framework not found at $FRAMEWORK_SRC"
            find "${{ steps.locate.outputs.release_dir }}" -maxdepth 1 | sort
            exit 1
          fi
          mkdir -p "$APP_PATH/Contents/Frameworks"
          ditto "$FRAMEWORK_SRC" "$APP_PATH/Contents/Frameworks/Sparkle.framework"

          chmod +x "$APP_PATH/Contents/MacOS/Pulsar"

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found .app at: $APP_PATH"

      # The swift build step above produces a binary with only the
      # *linker-signed* ad-hoc stamp the arm64 linker emits during
      # compilation. macOS treats linker-signed binaries as effectively
      # unsigned for TCC purposes — Accessibility / Mic / Keychain grants
      # are silently ignored even when the user has toggled the permission
      # on in System Settings.
      #
      # Replacing it with an explicit ad-hoc signature (`codesign --sign -`)
      # produces a code signature with a real Designated Requirement keyed to
      # the binary's CDHash. TCC honours that. Doesn't replace a real
      # Developer ID for distribution but is the highest level of unsigned
      # distribution macOS will treat as a stable identity.
      - name: Replace linker-signed stamp with explicit ad-hoc signature
        run: |
          set -e
          APP_PATH="${{ steps.bundle.outputs.app_path }}"

          echo "Before re-signing:"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -E "Signature|flags|CDHash" || true

          # `--deep` re-signs nested frameworks (Sparkle.framework) so the
          # bundle is internally consistent. `--force` overrides the existing
          # linker-signed signature.
          #
          # Intentionally NOT passing `--options runtime`. Hardened runtime
          # without the matching entitlements (com.apple.security.cs.*)
          # prevents Sparkle.framework from loading at app launch — the
          # binary signs cleanly but the .app silently fails to start. We
          # can revisit hardened runtime after the real Developer ID cert
          # lands and we set up the full notarisation flow with
          # entitlements; for ad-hoc distribution it adds risk without
          # benefit because TCC doesn't require it.
          # Inside-out: sign the embedded framework (deep, to catch its nested
          # XPC services + Updater.app) first, then the whole app so the outer
          # signature seals the framework.
          codesign --force --deep --sign - "$APP_PATH/Contents/Frameworks/Sparkle.framework"
          codesign --force --deep --sign - "$APP_PATH"

          echo "After re-signing:"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -E "Signature|flags|CDHash" || true

          # Sanity check: signature should be `adhoc` without `linker-signed`.
          if codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -q "linker-signed"; then
            echo "::error::Signature still flagged linker-signed after explicit codesign"
            exit 1
          fi

          # Fail the build if the signature isn't valid — a broken sign ships a
          # DMG that dyld-crashes or Gatekeeper blocks. This is the guard the
          # 0.2.0 Sparkle attempt lacked.
          if ! codesign --verify --deep --strict "$APP_PATH"; then
            echo "::error::codesign --verify --deep --strict failed on $APP_PATH"
            exit 1
          fi

      - name: Build .dmg via hdiutil
        id: dmg
        run: |
          set -e
          APP_PATH="${{ steps.bundle.outputs.app_path }}"
          VERSION="${{ steps.version.outputs.marketing_version }}"
          DMG_NAME="Pulsar-${VERSION}.dmg"

          mkdir -p dist dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create \
            -volname "Pulsar" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "dist/${DMG_NAME}"

          echo "dmg_path=dist/${DMG_NAME}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"
          ls -la dist/

      - name: Upload .dmg as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.dmg.outputs.dmg_name }}
          path: ${{ steps.dmg.outputs.dmg_path }}
          retention-days: 30

      - name: Install Sparkle CLI tools (sign_update)
        if: env.SPARKLE_ED_PRIVATE_KEY != ''
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -e
          SPARKLE_VERSION="2.6.4"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle
          SIGN_UPDATE=$(find /tmp/sparkle -name "sign_update" -type f | head -n 1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "::error::sign_update not found in Sparkle bundle"
            exit 1
          fi
          chmod +x "$SIGN_UPDATE"
          echo "SIGN_UPDATE=$SIGN_UPDATE" >> "$GITHUB_ENV"

      - name: Sign .dmg + generate appcast.xml
        id: appcast
        if: env.SPARKLE_ED_PRIVATE_KEY != ''
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -e
          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"
          DMG_NAME="${{ steps.dmg.outputs.dmg_name }}"
          SHORT_VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${{ github.run_number }}"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG_NAME}"

          KEY_FILE=$(mktemp)
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          SIG_OUTPUT=$("$SIGN_UPDATE" -f "$KEY_FILE" "$DMG_PATH")
          rm -f "$KEY_FILE"
          ED_SIGNATURE=$(echo "$SIG_OUTPUT" | grep -oE 'sparkle:edSignature="[^"]*"' | sed 's/.*="\(.*\)"/\1/')
          DMG_LENGTH=$(echo "$SIG_OUTPUT" | grep -oE 'length="[^"]*"' | sed 's/.*="\(.*\)"/\1/')
          if [ -z "$ED_SIGNATURE" ] || [ -z "$DMG_LENGTH" ]; then
            echo "::error::Could not parse sign_update output"
            exit 1
          fi

          PUB_DATE=$(LC_TIME=C date -u +"%a, %d %b %Y %H:%M:%S +0000")

          mkdir -p dist
          cat > dist/appcast.xml <<APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Pulsar</title>
              <link>https://github.com/${GITHUB_REPOSITORY}/releases/latest</link>
              <description>Pulsar gives Claude Code a voice — free, fully local, no account, no API key, nothing leaving your machine.</description>
              <language>en</language>
              <item>
                <title>Pulsar ${SHORT_VERSION}</title>
                <link>https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}</link>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${SHORT_VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  length="${DMG_LENGTH}"
                  type="application/octet-stream"
                  sparkle:edSignature="${ED_SIGNATURE}" />
              </item>
            </channel>
          </rss>
          APPCAST

      - name: Update rolling 'latest' release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Pulsar — latest dev build"
          files: |
            ${{ steps.dmg.outputs.dmg_path }}
          prerelease: true
          make_latest: "false"
          body: |
            **Pulsar gives Claude Code a voice — free, fully local, no account, no API key, nothing leaving your machine.** Rolling latest dev build, refreshed on every push to `main`. For tagged stable releases see the [Releases list](https://github.com/justinwilliames/pulsar-by-orbit/releases).

            Built from commit [`${{ github.sha }}`](https://github.com/justinwilliames/pulsar-by-orbit/commit/${{ github.sha }}).

            > [!IMPORTANT]
            > **You MUST run a Terminal command before this app will open.**
            > Pulsar is unsigned (no Apple Developer ID yet), so macOS Gatekeeper will refuse to launch it.

            ## Install

            ### 1. Download the .dmg below
            ### 2. Drag Pulsar into Applications
            ### 3. ⚠️ REQUIRED — run this in Terminal

            ```bash
            xattr -dr com.apple.quarantine "/Applications/Pulsar.app"
            ```

            One-time per install. Right-click → **Open** also works.

            ### 4. Launch from Applications

            Pulsar runs from Applications and checks this feed for updates.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tagged GitHub Release with .dmg + appcast
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.dmg.outputs.dmg_path }}
            dist/appcast.xml
          name: Pulsar ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          make_latest: "true"
          body: |
            **Pulsar gives Claude Code a voice — free, fully local, no account, no API key, nothing leaving your machine.**

            > [!IMPORTANT]
            > **You MUST run a Terminal command before this app will open.**
            > Pulsar is unsigned (no Apple Developer ID yet), so macOS Gatekeeper will refuse to launch it.

            ## Install — three steps, do all of them

            ### 1. Download the .dmg

            Click `${{ steps.dmg.outputs.dmg_name }}` below.

            ### 2. Drag Pulsar into Applications

            Open the `.dmg`, drag the **Pulsar** icon into the **Applications** shortcut.

            ### 3. ⚠️ REQUIRED — run this in Terminal

            ```bash
            xattr -dr com.apple.quarantine "/Applications/Pulsar.app"
            ```

            One-time per install. Right-click → **Open** also works, as does System Settings → Privacy & Security → "Open Anyway".

            ### 4. Launch from Applications

            Pulsar runs from Applications and checks this feed for updates.

            ## What this is

            Pulsar gives Claude Code a voice — free, fully local, no account, no API key, nothing leaving your machine. It lives in your menu bar and speaks the moment your code is done. Stop watching the screen.

            The `xattr` step above is required because Pulsar is open-source and unsigned — no Apple Developer ID, no $99/yr tax. Run it once. You're done.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
